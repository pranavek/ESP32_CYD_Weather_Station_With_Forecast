name: Build & publish flasher

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Build firmware
        run: pio run -e esp32-cyd-st7789

      - name: Build filesystem image
        run: pio run -e esp32-cyd-st7789 -t buildfs

      - name: Stage flasher artifacts
        run: |
          set -euo pipefail
          BUILD_DIR=.pio/build/esp32-cyd-st7789
          OUT=docs/flasher
          cp "$BUILD_DIR/firmware.bin"   "$OUT/firmware.bin"
          cp "$BUILD_DIR/bootloader.bin" "$OUT/bootloader.bin"
          cp "$BUILD_DIR/partitions.bin" "$OUT/partitions.bin"
          # PlatformIO names the LittleFS image littlefs.bin (sometimes spiffs.bin).
          if   [ -f "$BUILD_DIR/littlefs.bin" ]; then cp "$BUILD_DIR/littlefs.bin" "$OUT/littlefs.bin";
          elif [ -f "$BUILD_DIR/spiffs.bin"  ]; then cp "$BUILD_DIR/spiffs.bin"   "$OUT/littlefs.bin";
          else echo "::error::filesystem image not found"; exit 1; fi
          ls -la "$OUT"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Upload release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            docs/flasher/firmware.bin
            docs/flasher/bootloader.bin
            docs/flasher/partitions.bin
            docs/flasher/littlefs.bin

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
