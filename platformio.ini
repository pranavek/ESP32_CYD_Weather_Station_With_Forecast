[env:esp32-cyd-st7789]
platform = espressif32
framework = arduino
board = esp32dev

; LittleFS filesystem — "default" partition gives exactly 1.5 MB (minimum required)
; Switch to "no_ota" for 2 MB if you add extra assets
board_build.filesystem = littlefs
board_build.partitions = default.csv

monitor_speed = 250000

lib_deps =
    bodmer/TFT_eSPI @ ^2.4.3
    https://github.com/Bodmer/OpenWeather
    https://github.com/Bodmer/JSON_Decoder
    bodmer/TJpg_Decoder @ ^1.1.0
    JChristensen/Timezone @ ^1.2.4
    PaulStoffregen/Time

; TFT_eSPI driver config for newer CYD (dual USB — USB-C + Micro-B, ST7789)
build_flags =
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DTFT_INVERSION_OFF
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTOUCH_CS=33
    -DLOAD_GLCD -DLOAD_FONT2 -DLOAD_FONT4 -DLOAD_FONT6 -DLOAD_FONT7 -DLOAD_FONT8
    -DLOAD_GFXFF -DSMOOTH_FONT
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DUSE_HSPI_PORT


; ── Older CYD (single USB / Micro-B only, ILI9341) ──────────────────────────
